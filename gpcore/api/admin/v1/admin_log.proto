syntax = "proto3";

package gpcore.api.admin.v1;

import "gpcore/api/cloud/v1/user.proto";
import "google/protobuf/timestamp.proto";

message AdminLog {
  string id = 1;

  gpcore.api.cloud.v1.BasicUser admin_user = 2;
  gpcore.api.cloud.v1.BasicUser target_user = 3;

  string message = 4;

  // count is the number of (consecutive) identical log messages. When identical
  // log messages are added, only this counter is incremented and the updated_at
  // timestamp is updated. The created_at timestamp remains the same.
  int64 count = 5;

  // created_at timestamp of the first log message (with that message) created.
  google.protobuf.Timestamp created_at = 1000;
  // updated_at timestamp of the last log message (with that message) created
  // or updated.
  google.protobuf.Timestamp updated_at = 1001;
}